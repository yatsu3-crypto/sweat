<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>汗かゆ食品ガイド｜やまもと皮膚科・漢方クリニック</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #f5f1e8;
    --bg-2: #ebe4d3;
    --paper: #fbf8f0;
    --ink: #2d2a24;
    --ink-soft: #5a544a;
    --ink-mute: #8b8478;
    --line: #d9d0bc;
    --accent: #4a6741;
    --accent-soft: #7a9070;
    --safe: #5b8a72;
    --caution: #c89b3c;
    --warn: #b85450;
    --shadow: 0 1px 0 rgba(0,0,0,.04), 0 8px 24px rgba(45,42,36,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Zen Kaku Gothic New',-apple-system,sans-serif;
    background:var(--bg);
    background-image:
      radial-gradient(1200px 600px at 90% -10%, rgba(122,144,112,.12), transparent 60%),
      radial-gradient(800px 500px at -10% 110%, rgba(200,155,60,.10), transparent 60%);
    color:var(--ink);
    min-height:100vh;
    line-height:1.7;
    font-feature-settings:"palt";
    -webkit-font-smoothing:antialiased;
  }

  /* ヘッダー */
  .topbar{position:sticky;top:0;z-index:10;background:rgba(245,241,232,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:680px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:12px;}
  .topbar-mark{width:34px;height:34px;flex:0 0 auto;border:1px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;color:var(--accent);font-weight:600;font-size:16px;}
  .topbar-title{font-family:'Shippori Mincho',serif;font-size:15px;font-weight:600;letter-spacing:.04em;}
  .topbar-sub{font-size:11px;color:var(--ink-mute);letter-spacing:.06em;}

  main{max-width:680px;margin:0 auto;padding:20px 20px 100px;}

  /* タブ */
  .tabs{display:flex;gap:0;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:4px;margin-bottom:18px;}
  .tab{flex:1;border:none;background:none;padding:10px 8px;font-family:inherit;font-size:13px;color:var(--ink-mute);border-radius:10px;cursor:pointer;transition:all .2s;letter-spacing:.05em;}
  .tab.active{background:var(--accent);color:#fff;font-weight:600;}

  .panel{display:none;}
  .panel.active{display:block;animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  /* 検索カード */
  .search-card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow);}
  .search-label{font-size:12px;color:var(--ink-mute);letter-spacing:.15em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .search-label::before{content:"";display:inline-block;width:14px;height:1px;background:var(--accent);}
  .search-row{display:flex;gap:8px;}
  .search-input{flex:1;border:1px solid var(--line);background:#fff;border-radius:12px;padding:14px 16px;font-size:16px;font-family:inherit;color:var(--ink);outline:none;transition:border-color .2s;}
  .search-input:focus{border-color:var(--accent);}
  .search-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:0 20px;font-size:14px;font-weight:600;font-family:inherit;letter-spacing:.05em;cursor:pointer;transition:all .15s;min-width:80px;}
  .search-btn:active{transform:scale(.97);}

  /* クイック例 */
  .quick-list{margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;}
  .quick-list small{font-size:11px;color:var(--ink-mute);margin-right:4px;align-self:center;}
  .chip{border:1px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:999px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;}
  .chip:active{background:var(--bg-2);}

  /* 結果 */
  .result-area{margin-top:18px;}
  .result-card{background:var(--paper);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line);animation:slideUp .3s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .verdict{padding:24px 22px 20px;color:#fff;position:relative;overflow:hidden;}
  .verdict::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 90% 30%, rgba(255,255,255,.18), transparent 50%),radial-gradient(circle at 10% 90%, rgba(0,0,0,.10), transparent 50%);pointer-events:none;}
  .verdict.safe{background:linear-gradient(135deg, #5b8a72, #4a6741);}
  .verdict.caution{background:linear-gradient(135deg, #d4a64a, #b8862a);}
  .verdict.warn{background:linear-gradient(135deg, #c46862, #9d3f3b);}
  .verdict-food{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:600;margin:0 0 4px;position:relative;}
  .verdict-summary{position:relative;opacity:.95;font-size:13px;}
  .verdict-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:6px 14px;font-size:13px;font-weight:500;letter-spacing:.08em;margin-top:10px;position:relative;}
  .verdict-tag::before{content:"";width:8px;height:8px;border-radius:50%;background:#fff;}
  .verdict-body{padding:22px;}
  .verdict-body h3{font-family:'Shippori Mincho',serif;font-size:14px;font-weight:600;margin:0 0 8px;color:var(--accent);letter-spacing:.1em;display:flex;align-items:center;gap:8px;}
  .verdict-body h3::before{content:"";width:4px;height:14px;background:var(--accent);}
  .verdict-body h3:not(:first-child){margin-top:18px;}
  .verdict-body ul{margin:6px 0 0;padding-left:18px;font-size:14px;color:var(--ink-soft);}
  .verdict-body ul li{margin-bottom:4px;}
  .verdict-body ul li::marker{color:var(--accent);}

  /* 未収載の表示 */
  .not-found{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:var(--shadow);}
  .not-found h3{font-family:'Shippori Mincho',serif;color:var(--accent);font-size:16px;margin:0 0 12px;}
  .not-found .basic-rules{margin-top:14px;}
  .basic-rule{display:flex;gap:12px;padding:12px 0;border-top:1px dashed var(--line);font-size:13px;}
  .basic-rule:first-of-type{border-top:none;}
  .basic-rule .rule-dot{width:14px;height:14px;border-radius:50%;flex:0 0 auto;margin-top:4px;}
  .basic-rule .rule-dot.safe{background:var(--safe);}
  .basic-rule .rule-dot.caution{background:var(--caution);}
  .basic-rule .rule-dot.warn{background:var(--warn);}
  .basic-rule .rule-text strong{display:block;margin-bottom:2px;}
  .basic-rule .rule-text small{color:var(--ink-mute);font-size:12px;}
  .not-found-tip{margin-top:18px;padding:12px 14px;background:#f4ede0;border-left:3px solid var(--accent);font-size:12px;color:var(--ink-soft);border-radius:6px;}

  /* カテゴリタイル */
  .category-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .cat-tile{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px 14px;cursor:pointer;transition:all .15s;text-align:left;font-family:inherit;}
  .cat-tile:active{transform:scale(.98);background:var(--bg-2);}
  .cat-tile-icon{font-family:'Shippori Mincho',serif;font-size:22px;color:var(--accent);margin-bottom:4px;}
  .cat-tile-name{font-size:14px;font-weight:600;}
  .cat-tile-count{font-size:11px;color:var(--ink-mute);margin-top:2px;}

  /* 食品リスト */
  .food-list{display:flex;flex-direction:column;gap:6px;}
  .food-item{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;font-family:inherit;text-align:left;border-left:none;width:100%;}
  .food-item:active{transform:scale(.99);}
  .food-item.safe{border-left:4px solid var(--safe);}
  .food-item.caution{border-left:4px solid var(--caution);}
  .food-item.warn{border-left:4px solid var(--warn);}
  .food-item .name{flex:1;font-size:14px;font-weight:500;}
  .food-item .v-mini{font-size:11px;color:var(--ink-mute);letter-spacing:.05em;}

  /* 戻る */
  .back-btn{border:none;background:none;color:var(--accent);font-family:inherit;font-size:13px;padding:0;margin-bottom:14px;cursor:pointer;display:flex;align-items:center;gap:4px;}

  /* セクションタイトル */
  .section-title{font-family:'Shippori Mincho',serif;font-size:14px;color:var(--accent);letter-spacing:.15em;margin:0 0 12px;display:flex;align-items:center;gap:10px;}
  .section-title::after{content:"";flex:1;height:1px;background:var(--line);}

  /* 印刷ボタン */
  .print-action{margin-top:18px;text-align:center;}
  .print-btn{background:var(--paper);color:var(--accent);border:1px solid var(--accent);border-radius:12px;padding:12px 24px;font-family:inherit;font-size:13px;letter-spacing:.1em;cursor:pointer;font-weight:600;}
  .print-btn:active{background:var(--bg-2);}

  /* 印刷ビュー */
  .print-view{display:none;}
  .print-header{text-align:center;margin-bottom:20px;}
  .print-header h1{font-family:'Shippori Mincho',serif;font-size:20px;margin:0 0 4px;}
  .print-header p{font-size:11px;color:var(--ink-mute);margin:0;}
  .print-section{margin-bottom:18px;break-inside:avoid;}
  .print-section h2{font-family:'Shippori Mincho',serif;font-size:14px;padding:6px 10px;color:#fff;margin:0 0 8px;border-radius:4px;}
  .print-section h2.safe{background:var(--safe);}
  .print-section h2.caution{background:var(--caution);}
  .print-section h2.warn{background:var(--warn);}
  .print-foods{display:grid;grid-template-columns:repeat(3,1fr);gap:4px 10px;font-size:11px;}
  .print-foods div{padding:2px 0;}
  .print-clinic{text-align:right;margin-top:24px;font-size:10px;color:var(--ink-mute);font-family:'Shippori Mincho',serif;}

  .footer-note{margin-top:36px;text-align:center;font-size:11px;color:var(--ink-mute);line-height:1.8;padding:0 16px;}
  .footer-note .clinic{font-family:'Shippori Mincho',serif;color:var(--accent);font-size:12px;letter-spacing:.1em;display:block;margin-top:6px;}

  /* 印刷時 */
  @media print{
    body{background:#fff;}
    .topbar,.tabs,.footer-note,.panel:not(#panel-print),.print-action{display:none !important;}
    .print-view{display:block !important;}
    main{padding:0 12px;max-width:none;}
    @page{size:A4;margin:12mm;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-mark">汗</div>
    <div>
      <div class="topbar-title">汗かゆ食品ガイド</div>
      <div class="topbar-sub">コリン性蕁麻疹・汗アレルギー</div>
    </div>
  </div>
</div>

<main>

  <div class="tabs">
    <button class="tab active" data-panel="search">検索</button>
    <button class="tab" data-panel="browse">分類で見る</button>
    <button class="tab" data-panel="oklist">OK食品</button>
    <button class="tab" data-panel="print">印刷</button>
  </div>

  <!-- 検索パネル -->
  <section class="panel active" id="panel-search">
    <div class="search-card">
      <div class="search-label">食品名を入力</div>
      <div class="search-row">
        <input type="text" class="search-input" id="foodInput" placeholder="例：キムチ、コーヒー、サバ…" autocomplete="off">
        <button class="search-btn" id="checkBtn">検索</button>
      </div>
      <div class="quick-list">
        <small>例：</small>
        <button class="chip" data-food="麻婆豆腐">麻婆豆腐</button>
        <button class="chip" data-food="ビール">ビール</button>
        <button class="chip" data-food="チョコレート">チョコレート</button>
        <button class="chip" data-food="鶏むね肉">鶏むね肉</button>
        <button class="chip" data-food="冷奴">冷奴</button>
      </div>
    </div>
    <div class="result-area" id="resultArea"></div>
  </section>

  <!-- カテゴリパネル -->
  <section class="panel" id="panel-browse">
    <div id="catList"></div>
  </section>

  <!-- OK食品パネル -->
  <section class="panel" id="panel-oklist">
    <div class="section-title">食 べ て O K の 食 品</div>
    <div class="food-list" id="okList"></div>
  </section>

  <!-- 印刷パネル -->
  <section class="panel" id="panel-print">
    <div class="section-title">患 者 配 布 用 印 刷</div>
    <p style="font-size:13px;color:var(--ink-soft);margin:0 0 14px;">A4一覧表として印刷できます。診察時の説明資料や、ご家庭での参考にお使いください。</p>
    <div class="print-action">
      <button class="print-btn" onclick="window.print()">印刷プレビューを開く</button>
    </div>

    <div class="print-view" id="printView"></div>
  </section>

  <p class="footer-note">
    本ガイドは患者さんのセルフケア補助を目的としたものです。<br>
    症状の重さや治療内容に応じた判断は主治医にご相談ください。
    <span class="clinic">やまもと皮膚科・漢方クリニック</span>
  </p>

</main>

/* ============================
   ロジック
   ============================ */

// タブ切り替え
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
  });
});

// 検索
const foodInput = document.getElementById('foodInput');
const checkBtn = document.getElementById('checkBtn');
const resultArea = document.getElementById('resultArea');

document.querySelectorAll('.chip').forEach(btn => {
  btn.addEventListener('click', () => {
    foodInput.value = btn.dataset.food;
    doSearch();
  });
});
foodInput.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); doSearch(); }});
checkBtn.addEventListener('click', doSearch);

function normalize(s){
  return String(s||'').toLowerCase().trim()
    .replace(/[ァ-ン]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60)) // カナ→かな
    .replace(/\s+/g, '');
}

function doSearch(){
  const q = foodInput.value.trim();
  if(!q){ foodInput.focus(); return; }
  const nq = normalize(q);

  // 完全一致 → 部分一致 → サマリー部分一致
  let hit = FOODS.find(f => normalize(f.n) === nq);
  if(!hit) hit = FOODS.find(f => normalize(f.n).includes(nq) || nq.includes(normalize(f.n)));
  if(!hit) hit = FOODS.find(f => normalize(f.s).includes(nq) || (f.r||[]).some(r => normalize(r).includes(nq)));

  if(hit) renderHit(hit);
  else renderNotFound(q);
}

function renderHit(f){
  const labels = {safe:'食べてOK', caution:'注意して', warn:'控えめに'};
  resultArea.innerHTML = `
    <article class="result-card">
      <header class="verdict ${f.v}">
        <h2 class="verdict-food">${esc(f.n)}</h2>
        <div class="verdict-summary">${esc(f.s)}</div>
        <div class="verdict-tag">${labels[f.v]}</div>
      </header>
      <div class="verdict-body">
        <h3>判定の理由</h3>
        <ul>${(f.r||[]).map(x => `<li>${esc(x)}</li>`).join('')}</ul>
        <h3>食べ方のヒント</h3>
        <ul>${(f.t||[]).map(x => `<li>${esc(x)}</li>`).join('')}</ul>
      </div>
    </article>
  `;
  setTimeout(() => resultArea.scrollIntoView({behavior:'smooth', block:'start'}), 80);
}

function renderNotFound(q){
  resultArea.innerHTML = `
    <div class="not-found">
      <h3>「${esc(q)}」はデータに登録されていません</h3>
      <p style="font-size:13px;color:var(--ink-soft);margin:0;">代わりに、判定の基本ルールをご参考にしてください。</p>
      <div class="basic-rules">
        <div class="basic-rule">
          <div class="rule-dot warn"></div>
          <div class="rule-text">
            <strong>控えめに：辛いもの・お酒・熱い飲食物</strong>
            <small>急な発汗や血管拡張で症状を誘発しやすい</small>
          </div>
        </div>
        <div class="basic-rule">
          <div class="rule-dot warn"></div>
          <div class="rule-text">
            <strong>控えめに：甘いもの・脂っこいもの</strong>
            <small>皮脂が増えて汗アレルゲンが発生しやすくなる</small>
          </div>
        </div>
        <div class="basic-rule">
          <div class="rule-dot caution"></div>
          <div class="rule-text">
            <strong>注意：青魚・熟成チーズ・サラミなど</strong>
            <small>かゆみの元(ヒスタミン)が多い食品</small>
          </div>
        </div>
        <div class="basic-rule">
          <div class="rule-dot caution"></div>
          <div class="rule-text">
            <strong>注意:カフェイン(コーヒー・エナジードリンク)</strong>
            <small>発汗の指令を出しやすくする</small>
          </div>
        </div>
        <div class="basic-rule">
          <div class="rule-dot safe"></div>
          <div class="rule-text">
            <strong>食べてOK：白身魚・鶏ささみ・豆腐・野菜・ご飯</strong>
            <small>刺激成分が少なく日常的に安心して食べられる</small>
          </div>
        </div>
      </div>
      <div class="not-found-tip">
        判断に迷う時は、診察時に「これ食べてもよいか」と気軽にご相談ください。
      </div>
    </div>
  `;
  setTimeout(() => resultArea.scrollIntoView({behavior:'smooth', block:'start'}), 80);
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* カテゴリブラウズ */
const catList = document.getElementById('catList');
function renderCategories(){
  catList.innerHTML = `
    <div class="category-grid">
      ${CATEGORIES.map(c => {
        const count = FOODS.filter(f => f.c === c.id).length;
        return `<button class="cat-tile" data-cat="${c.id}">
          <div class="cat-tile-icon">${c.name[0]}</div>
          <div class="cat-tile-name">${esc(c.name)}</div>
          <div class="cat-tile-count">${count}件・${esc(c.desc)}</div>
        </button>`;
      }).join('')}
    </div>
  `;
  catList.querySelectorAll('.cat-tile').forEach(tile => {
    tile.addEventListener('click', () => renderCategoryFoods(tile.dataset.cat));
  });
}

function renderCategoryFoods(catId){
  const cat = CATEGORIES.find(c => c.id === catId);
  const foods = FOODS.filter(f => f.c === catId);
  const labels = {safe:'食べてOK', caution:'注意して', warn:'控えめに'};
  catList.innerHTML = `
    <button class="back-btn" id="backBtn">← 分類一覧へ戻る</button>
    <div class="section-title">${esc(cat.name)}</div>
    <div class="food-list">
      ${foods.map(f => `
        <button class="food-item ${f.v}" data-food="${esc(f.n)}">
          <div class="name">${esc(f.n)}</div>
          <div class="v-mini">${labels[f.v]}</div>
        </button>
      `).join('')}
    </div>
  `;
  document.getElementById('backBtn').addEventListener('click', renderCategories);
  catList.querySelectorAll('.food-item').forEach(item => {
    item.addEventListener('click', () => {
      // 検索タブに飛ばして表示
      document.querySelector('[data-panel="search"]').click();
      foodInput.value = item.dataset.food;
      doSearch();
    });
  });
}
renderCategories();

/* OK食品リスト */
function renderOkList(){
  const okFoods = FOODS.filter(f => f.v === 'safe');
  const okList = document.getElementById('okList');
  okList.innerHTML = okFoods.map(f => `
    <button class="food-item safe" data-food="${esc(f.n)}">
      <div class="name">${esc(f.n)}</div>
      <div class="v-mini">${esc(f.s)}</div>
    </button>
  `).join('');
  okList.querySelectorAll('.food-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelector('[data-panel="search"]').click();
      foodInput.value = item.dataset.food;
      doSearch();
    });
  });
}
renderOkList();

/* 印刷ビュー */
function renderPrintView(){
  const groups = {
    safe: {label:'食 べ て O K', desc:'日常的に安心して食べられる食品'},
    caution: {label:'注 意 し て', desc:'量・タイミング・組み合わせに気をつけて'},
    warn: {label:'控 え め に', desc:'症状が出やすい時期はなるべく避ける'},
  };
  const view = document.getElementById('printView');
  view.innerHTML = `
    <div class="print-header">
      <h1>汗かゆ食品ガイド</h1>
      <p>コリン性蕁麻疹・汗アレルギーの方へ</p>
    </div>
    ${['safe','caution','warn'].map(v => {
      const foods = FOODS.filter(f => f.v === v).map(f => f.n);
      return `
        <div class="print-section">
          <h2 class="${v}">${groups[v].label}　${groups[v].desc}</h2>
          <div class="print-foods">
            ${foods.map(n => `<div>・${esc(n)}</div>`).join('')}
          </div>
        </div>
      `;
    }).join('')}
    <div class="print-clinic">やまもと皮膚科・漢方クリニック</div>
  `;
}
renderPrintView();
</script>
